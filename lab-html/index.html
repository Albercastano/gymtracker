<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#06070a">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>GymTracker Lab 9.4.1</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body><div id="splash" class="splash">
  <div class="splashBox">
    <div class="splashLogo">GT</div>
    <h1>GymTracker</h1>
    <p class="splashSub">Entrena. Registra. Progresa.</p>
    <button class="wall primary" onclick="GT.selectUser('Alberto');GT.closeSplash()">💪 Alberto</button>
    <button class="wall" onclick="GT.selectUser('Edy');GT.closeSplash()">🏋️ Edy</button>
    <button onclick="GT.closeSplash()">Continuar</button>
  </div>
</div>
<div id="summaryOverlay" class="summaryOverlay"><div class="summaryBox" id="summaryBox"></div></div>
  <div class="badge">LAB 9.4.1</div>

  <div id="profileModal" class="modal on">
    <div class="modalBox">
      <h1>¿Quién va a entrenar?</h1>
      <button class="wall primary" onclick="GT.selectUser('Alberto')">💪 Alberto</button>
      <button class="wall" onclick="GT.selectUser('Edy')">🏋️ Edy</button>
      <p class="muted">Cada perfil tiene rutinas, entrenos, datos y planificación propios.</p>
    </div>
  </div>

  <header>
    <button id="userChip" class="chip" onclick="GT.openUsers()">💪 Alberto</button>
    <div>
      <strong>GymTracker Lab 9.4.1</strong>
      <small id="todayLabel"></small>
    </div>
  </header>

  <main>
    <section id="home" class="screen on"></section>
    <section id="workout" class="screen"></section>
    <section id="routines" class="screen"></section>
    <section id="plan" class="screen"></section>
    <section id="data" class="screen"></section>
    <section id="settings" class="screen"></section>
  </main>

  <nav>
    <button onclick="GT.show('home')" data-nav="home">🏋️<span>Hoy</span></button>
    <button onclick="GT.show('routines')" data-nav="routines">📚<span>Rutinas</span></button>
    <button onclick="GT.show('plan')" data-nav="plan">📅<span>Plan</span></button>
    <button onclick="GT.show('data')" data-nav="data">📈<span>Datos</span></button>
    <button onclick="GT.show('settings')" data-nav="settings">⚙️<span>Ajustes</span></button>
  </nav>

  <script src="storage.js"></script>
  <script src="routines.js"></script>
  <script src="workout.js"></script>
  <script src="stats.js"></script>
  <script src="season.js"></script>
  <script src="app.js"></script>
</body>
</html>
