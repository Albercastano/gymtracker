<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#000"><title>Reparar Apex</title><style>html{background:#000;color:#eefcff;font-family:system-ui}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px}.card{max-width:430px;border:1px solid #164456;border-radius:24px;padding:24px;background:#02070a;box-shadow:0 0 50px #00394b55}h1{font-weight:500;letter-spacing:.05em}p{color:#8fa2aa;line-height:1.5}button{width:100%;min-height:56px;border-radius:18px;border:1px solid #00d9ff;background:#001217;color:#eaffff;font-weight:800;letter-spacing:.08em}</style></head><body><main class="card"><h1>REPARAR FORGED APEX</h1><p>Elimina únicamente la caché antigua de Phoenix y el registro de la PWA. Tus perfiles, rutinas, entrenamientos y PEDB personal no se borran.</p><button id="repair">ACTUALIZAR A APEX</button><p id="status"></p></main><script>async function repair(){status.textContent="Limpiando versión anterior…";try{const regs=await navigator.serviceWorker?.getRegistrations?.()||[];await Promise.all(regs.map(r=>r.unregister()));const keys=await caches?.keys?.()||[];await Promise.all(keys.filter(k=>k.startsWith("gymtracker-phoenix")).map(k=>caches.delete(k)));status.textContent="Apex preparado. Reiniciando…";location.replace("index.html?v=017&apexrepair="+Date.now())}catch(e){status.textContent="No se pudo limpiar automáticamente. Cierra la PWA y vuelve a abrir este enlace."}}repair.onclick=repair;repair();</script></body></html>
