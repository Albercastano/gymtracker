<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050507">
  <title>GymTracker Phoenix v7</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section id="splash" class="splash">
    <div class="splash-card">
      <div class="phoenix">🔥</div>
      <h1>GymTracker</h1>
      <div class="sub">PHOENIX</div>
      <p>Entrena más. Toca menos.</p>
    </div>
  </section>

  <header class="topbar">
    <button id="destButton" class="dest-button" onclick="App.goDestination()">Inicio</button>
    <div class="version">v7 · GYM READY</div>
  </header>

  <main>
    <section id="home" class="screen active"></section>
    <section id="gym" class="screen"></section>
    <section id="series" class="screen"></section>
    <section id="rest" class="screen"></section>
    <section id="exerciseSummary" class="screen"></section>
    <section id="workoutSummary" class="screen"></section>
    <section id="data" class="screen"></section>
    <section id="routines" class="screen"></section>
    <section id="history" class="screen"></section>
    <section id="settings" class="screen"></section>
    <section id="backups" class="screen"></section>
  </main>

  <div id="alternativesSheet" class="sheet">
    <div class="sheet-backdrop" onclick="App.closeAlternatives()"></div>
    <div class="sheet-panel">
      <div class="handle"></div>
      <h2>Alternativas</h2>
      <p id="altCurrent" class="muted"></p>
      <div id="altList" class="list"></div>
      <button class="secondary" onclick="App.closeAlternatives()">Cerrar</button>
    </div>
  </div>

  <input id="importFile" type="file" accept=".json,application/json" hidden onchange="App.importBackupFile(this.files[0])">
  <script src="app.js"></script>
</body>
</html>
